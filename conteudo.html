<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conteúdo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0b1d3a, #1d3557, #2a6f97, #e9c46a);
  color: white;
}

.header { padding: 80px 60px 30px; }

.header h1 {
  font-family: 'Outfit', sans-serif;
  font-size: 3rem;
}

.header p {
  margin-top: 10px;
  color: rgba(255,255,255,0.8);
}

.voltar {
  display:inline-block;
  margin-bottom:30px;
  padding:10px 22px;
  border-radius:30px;
  background: rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.5);
  color:white;
  text-decoration:none;
}

.intro { padding:0 60px 20px; color:rgba(255,255,255,0.85); }
.main { padding:40px 60px; }

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap:25px;
}

.card {
  padding:30px;
  border-radius:20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  text-align:center;
  cursor:pointer;
  transition:0.35s;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

.icon { font-size:40px; margin-bottom:15px; }

.info-box {
  margin-top:40px;
  padding:25px;
  border-radius:15px;
  background: rgba(255,255,255,0.07);
}

.dica {
  margin-top:20px;
  padding:20px;
  border-left:4px solid #e9c46a;
  background: rgba(255,255,255,0.05);
  border-radius:10px;
}

.footer {
  text-align:center;
  padding:30px;
  color:rgba(255,255,255,0.6);
}

@media (max-width:700px){
  .header,.main,.intro { padding:20px; }
}
</style>
</head>

<body>

<div class="header">
  <a href="index.html" class="voltar">← Voltar</a>
  <h1 id="titulo"></h1>
  <p id="descricao"></p>
</div>

<div class="intro">
  Escolha como deseja consumir o conteúdo.
</div>

<div class="main">

  <div class="grid">

    <div class="card" onclick="abrirSecao('apresentacao')">
      <div class="icon">📊</div>
      <h2>Apresentação</h2>
    </div>

    <div class="card" onclick="abrirSecao('video')">
      <div class="icon">🎥</div>
      <h2>Videoaula</h2>
    </div>

    <div class="card" onclick="abrirSecao('ebook')">
      <div class="icon">📘</div>
      <h2>E-book</h2>
    </div>

  </div>

  <div class="info-box">
    Este conteúdo foi estruturado para oferecer aprendizado completo.
  </div>

  <div class="dica">
    💡 Comece pela apresentação, depois vídeo e finalize com o e-book.
  </div>

</div>

<div class="footer">
  © 2026 — Nicholas Grassotti Spolavori
</div>

<!-- FIREBASE PRIMEIRO -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAH0xTUWEeMqsxAIFOMTmDdhAdPHb5AkRY",
  authDomain: "nick-curso.firebaseapp.com",
  projectId: "nick-curso",
  storageBucket: "nick-curso.firebasestorage.app",
  messagingSenderId: "774707174312",
  appId: "1:774707174312:web:e9fbf29073ce35bcbe9b9d",
  measurementId: "G-R87PV5NDGW"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* DADOS FIXOS */
const dados = {
  incoterms:{titulo:"Incoterms",descricao:"Regras internacionais"},
  sinistro:{titulo:"Sinistro",descricao:"Análise de perdas"},
  risco:{titulo:"Risco",descricao:"Prevenção"},
  seguro:{titulo:"Seguro",descricao:"Cobertura"},
  documentos:{titulo:"Documentos",descricao:"Controle"},
  prevencao:{titulo:"Prevenção",descricao:"Evitar prejuízos"}
};

const temaSelecionado = localStorage.getItem("temaSelecionado");

let temaAtual = null;

/* CARREGAR FIREBASE */
db.ref("temas").on("value", snapshot => {

 const dadosFirebase = snapshot.val() || {};
const temas = Object.values(dadosFirebase);

  const temaAdmin = temas.find(t => t.id == temaSelecionado);
  const temaFixo = dados[temaSelecionado];

  temaAtual = temaAdmin || {};

  if (temaAdmin) {
    titulo.innerText = temaAdmin.titulo;
    descricao.innerText = temaAdmin.descricao;
  } else if (temaFixo) {
    titulo.innerText = temaFixo.titulo;
    descricao.innerText = temaFixo.descricao;
  }

});

/* ABRIR CONTEÚDO */
function abrirSecao(tipo){

  if(tipo === "video" && temaAtual.video){
    window.open(temaAtual.video, "_blank");
    return;
  }

  if(tipo === "apresentacao" && temaAtual.imagem){
    window.open(temaAtual.imagem, "_blank");
    return;
  }

  if(tipo === "ebook" && temaAtual.pdf){
    window.open(temaAtual.pdf, "_blank");
    return;
  }

  alert("Conteúdo não encontrado.");
}
  
</script>

</body>
</html>
